apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Spark Operator Metrics (CORRECTED: port 8080)
      - job_name: 'spark-operator'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - default
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            action: keep
            regex: spark-operator-controller-.*$
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080
        metrics_path: /metrics

      # Yunikorn Scheduler Metrics
      # Note: Yunikorn metrics may need to be enabled via config
      - job_name: 'yunikorn-scheduler'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - default
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            action: keep
            regex: yunikorn-scheduler-.*$
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: container
            regex: yunikorn-scheduler-k8s
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9080
        metrics_path: /ws/v1/metrics

      # Hynix Spark Service Metrics
      - job_name: 'hynix-spark-service'
        static_configs:
          - targets: ['hynix-service:8080']
        metrics_path: /metrics
