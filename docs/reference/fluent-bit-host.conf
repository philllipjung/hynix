# ============================================================================
# Fluent Bit Host Configuration
# ============================================================================
#
# Description:
#   Collects system-level logs from the Linux host machine.
#   Runs as a systemd service (fluent-bit-host.service).
#
# Logs Collected:
#   - Microservice logs (Hynix Spark common service)
#   - Kubelet logs (pulled from minikube)
#   - System logs (syslog, kernel)
#   - Container runtime logs (containerd, docker, crio via journald)
#
# Installation:
#   cp /root/hynix/fluent-bit/fluent-bit-host.conf /etc/fluent-bit/fluent-bit.conf
#   systemctl restart fluent-bit-host.service
#
# ============================================================================

[SERVICE]
    Flush         5
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf

# ============================================================================
# INPUTS
# ============================================================================

# --------------------------------------------------------------------------
# INPUT: Microservice Logs
# --------------------------------------------------------------------------
# Source: /root/hynix/server.log
# Description: Hynix Spark common microservice logs
[INPUT]
    Name              tail
    Path              /root/hynix/server.log
    Tag               microservice.hynix
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/flb_microservice.db
    DB.Sync           Normal
    DB.Locking        True
    Read_from_Head    False

# --------------------------------------------------------------------------
# INPUT: Kubelet Logs (pulled from minikube)
# --------------------------------------------------------------------------
# Source: /var/log/kubelet/kubelet.log
# Description: Kubelet logs pulled from minikube systemd journal
# Method: Cron job runs /usr/local/bin/pull-kubelet-logs.sh every 5 minutes
[INPUT]
    Name              tail
    Path              /var/log/kubelet/kubelet.log
    Tag               host.kubelet
    Parser            syslog
    Refresh_Interval  60
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/flb_kubelet.db
    DB.Sync           Normal
    DB.Locking        True
    Read_from_Head    False

# --------------------------------------------------------------------------
# INPUT: System Logs
# --------------------------------------------------------------------------
# Source: /var/log/syslog
# Description: System syslog (containerd, CRI daemon, system logs)
[INPUT]
    Name              tail
    Path              /var/log/syslog
    Tag               host.syslog
    Parser            syslog-rfc5424
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /var/lib/fluent-bit/flb_syslog.db
    DB.Sync           Normal
    DB.Locking        True
    Read_from_Head    False

# --------------------------------------------------------------------------
# INPUT: Containerd Runtime Logs (via journald)
# --------------------------------------------------------------------------
# Source: systemd journal
# Description: Containerd container runtime logs
[INPUT]
    Name              systemd
    Tag               journal.containerd
    Systemd_Filter    _SYSTEMD_UNIT=containerd.service
    Read_From_Tail    True
    Path              /run/log/journal

# --------------------------------------------------------------------------
# INPUT: Docker Runtime Logs (via journald)
# --------------------------------------------------------------------------
# Source: systemd journal
# Description: Docker container runtime logs (deprecated)
[INPUT]
    Name              systemd
    Tag               journal.docker
    Systemd_Filter    _SYSTEMD_UNIT=docker.service
    Read_From_Tail    True
    Path              /run/log/journal

# --------------------------------------------------------------------------
# INPUT: CRI-O Runtime Logs (via journald)
# --------------------------------------------------------------------------
# Source: systemd journal
# Description: CRI-O container runtime logs
[INPUT]
    Name              systemd
    Tag               journal.crio
    Systemd_Filter    _SYSTEMD_UNIT=crio.service
    Read_From_Tail    True
    Path              /run/log/journal

# ============================================================================
# FILTERS
# ============================================================================

[FILTER]
    Name                modify
    Match               microservice.*
    Add                 log_type     microservice
    Add                 service_name hynix-spark-common
    Add                 log_source   host

[FILTER]
    Name                modify
    Match               host.kubelet
    Add                 log_type     kubelet
    Add                 log_source   host

[FILTER]
    Name                modify
    Match               host.syslog
    Add                 log_type     cri
    Add                 log_source   host

[FILTER]
    Name                modify
    Match               journal.*
    Add                 log_type     journald
    Add                 log_source   host

[FILTER]
    Name                modify
    Match               *
    Add                 hostname     ${HOSTNAME}

# ============================================================================
# OUTPUT
# ============================================================================

[OUTPUT]
    Name                opensearch
    Match               *
    Host                192.168.201.152
    Port                9200
    Index               unified-logs
    Suppress_Type_Name  On
    Retry_Limit         3
    generate_id         On
    tls                 Off
    tls.verify          Off
    HTTP_User           -
    HTTP_Passwd         -
