# Fluent Bit Parsers 설정
# Docker, CRI, Syslog 등 다양한 로그 포맷 파싱

# =====================================================================
# PARSER: Docker (컨테이너) 로그
# =====================================================================
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: CRI (Container Runtime Interface)
# =====================================================================
[PARSER]
    Name        cri
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# =====================================================================
# PARSER: CRI-O
# =====================================================================
[PARSER]
    Name        crio
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# =====================================================================
# PARSER: Syslog (RFC3164)
# =====================================================================
[PARSER]
    Name        syslog
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# =====================================================================
# PARSER: Syslog (RFC5424)
# =====================================================================
[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[^ ]+) (?<msgid>[^ ]+) (?<extradata>(\[(.*)?\]|))?: *(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# =====================================================================
# PARSER: Kubernetes Events
# =====================================================================
[PARSER]
    Name        k8s-events
    Format      json
    Time_Key    eventTime
    Time_Format %Y-%m-%dT%H:%M:%S%z
    Time_Keep   On

# =====================================================================
# PARSER: JSON (일반 JSON 로그)
# =====================================================================
[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: Kubelet
# =====================================================================
[PARSER]
    Name        kubelet
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y%m%d %H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: Yunikorn Scheduler
# =====================================================================
[PARSER]
    Name        yunikorn
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) (?<logger>[^ ]+) - (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: Spark Operator
# =====================================================================
[PARSER]
    Name        spark-operator
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) (?<component>[^ /]+)/(?<file>[^:]+):(?<line>[0-9]+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: Kubernetes Controller Manager
# =====================================================================
[PARSER]
    Name        kcm
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y%m%d %H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: etcd
# =====================================================================
[PARSER]
    Name        etcd
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) \{.*\] (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: CNI (Calico, Cilium 등)
# =====================================================================
[PARSER]
    Name        cni
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
