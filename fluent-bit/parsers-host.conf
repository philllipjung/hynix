# Fluent Bit Parsers for Host Logs

# =====================================================================
# PARSER: Syslog RFC5424
# =====================================================================
[PARSER]
    Name        syslog-rfc5424
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[^ ]+) (?<msgid>[^ ]+) (?<extradata>(\[(.*)?\]|))?: *(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# =====================================================================
# PARSER: Syslog RFC3164 (일반 syslog)
# =====================================================================
[PARSER]
    Name        syslog-rfc3164
    Format      regex
    Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
    Time_Key    time
    Time_Format %b %d %H:%M:%S
    Time_Keep   On

# =====================================================================
# PARSER: JSON (마이크로서비스 로그)
# =====================================================================
[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# =====================================================================
# PARSER: Kubelet
# =====================================================================
[PARSER]
    Name        kubelet
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) (?<message>.*)$
    Time_Key    time
    Time_Format %Y%m%d %H:%M:%S.%L
    Time_Keep   On

# =====================================================================
# PARSER: Containerd
# =====================================================================
[PARSER]
    Name        containerd
    Format      regex
    Regex       ^time="(?<time>[^"]+)" level=(?<level>[^ ]+) msg="(?<message>[^"]*)"
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

# =====================================================================
# PARSER: CRI
# =====================================================================
[PARSER]
    Name        cri
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On
